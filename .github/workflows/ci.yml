name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Full fixture matrix for the taboo guard, including the
      # check that every hook in settings.json is registered via
      # $CLAUDE_PROJECT_DIR (issue #2: a relative path fails open
      # after any cd).
      - name: Guard test matrix
        run: sh .claude/hooks/guard-taboos-test.sh

      - name: Validate tracked JSON files
        run: |
          git ls-files '*.json' | while read -r f; do
            echo "checking $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Shell syntax check
        run: |
          for f in bin/* .claude/hooks/*.sh; do
            echo "checking $f"
            sh -n "$f"
          done

      - name: ShellCheck (error severity)
        run: shellcheck -S error bin/* .claude/hooks/*.sh
